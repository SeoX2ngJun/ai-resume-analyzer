spring:
  application:
    name: airesumeanalyzer

  datasource:
    url: jdbc:postgresql://localhost:5432/space_db
    username: space_user
    password: space_pwd
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB